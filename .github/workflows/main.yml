name: Actualización Automática UnivApp

on:
  push:
    branches: [ main ]

jobs:
  build_and_distribute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Permisos para Gradle
        run: chmod +x gradlew

      - name: Construir APK de Distribución
        run: ./gradlew assembleRelease

      - name: Subir a Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute app/build/outputs/apk/release/app-release.apk --app ${{ secrets.FIREBASE_APP_ID }} --groups "testers"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
